name: Cyta.cy EPG Builder v23.04 2026

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build EPG
        run: node scripts/build.js

      - name: Commit output
        run: |
          git config --global user.name "epg-bot"
          git config --global user.email "bot@github.com"
          git add data/
          git commit -m "update epg" || exit 0
          git push
